name: Update Rust Toolchain

# Checks daily for a newer stable Rust release. When one is available it opens a
# PR bumping the pin in rust-toolchain.toml, so CI can vet the new toolchain
# (new clippy lints, behavior changes) before we adopt it. Scheduled workflows
# only run from the default branch, so this takes effect once merged to main.
on:
  schedule:
    - cron: "0 13 * * *" # daily at 13:00 UTC
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    name: Open PR for newer stable Rust
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Determine latest stable and current pin
        id: versions
        run: |
          set -euo pipefail
          # Pull the real Rust release version from the [pkg.rust] section of the
          # stable channel manifest (other sections carry unrelated tool versions).
          latest="$(curl -sSf https://static.rust-lang.org/dist/channel-rust-stable.toml \
            | awk '/^\[pkg\.rust\]/{f=1} f && /^version = /{print; exit}' \
            | grep -oP '\d+\.\d+\.\d+' | head -1)"
          current="$(grep -oP 'channel\s*=\s*"\K[^"]+' rust-toolchain.toml)"
          if [ -z "$latest" ]; then
            echo "::error::Could not determine the latest stable Rust version" >&2
            exit 1
          fi
          echo "Current pin: $current; latest stable: $latest"
          echo "latest=$latest" >> "$GITHUB_OUTPUT"
          echo "current=$current" >> "$GITHUB_OUTPUT"
          if [ "$latest" != "$current" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Update rust-toolchain.toml
        if: steps.versions.outputs.changed == 'true'
        run: |
          sed -i 's/^channel = ".*"/channel = "${{ steps.versions.outputs.latest }}"/' rust-toolchain.toml

      - name: Create Pull Request
        if: steps.versions.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          # Prefer a PAT / GitHub App token so the opened PR triggers CI
          # (the default GITHUB_TOKEN does not, by design). Falls back to
          # GITHUB_TOKEN so the workflow still opens the PR if the secret is
          # unset — CI then has to be kicked off manually (see the PR body).
          token: ${{ secrets.RUST_UPDATE_TOKEN || github.token }}
          base: main
          branch: chore/bump-rust-${{ steps.versions.outputs.latest }}
          delete-branch: true
          commit-message: "chore: bump pinned Rust to ${{ steps.versions.outputs.latest }}"
          title: "chore: bump pinned Rust to ${{ steps.versions.outputs.latest }}"
          body: |
            A newer stable Rust release (`${{ steps.versions.outputs.latest }}`) is available.

            This bumps the pin in `rust-toolchain.toml` from
            `${{ steps.versions.outputs.current }}` → `${{ steps.versions.outputs.latest }}`.
            CI on this PR runs clippy/build/tests under the new toolchain, so new
            lints or breakage surface here before we adopt the upgrade.

            > [!NOTE]
            > If CI did not start automatically, this PR was opened with the
            > default `GITHUB_TOKEN`, which does not trigger workflows. Set a
            > `RUST_UPDATE_TOKEN` secret (a PAT or GitHub App token with
            > `contents` and `pull-requests` write) for automatic CI, or just
            > close and reopen the PR to kick it off.

            _Opened automatically by `.github/workflows/update-rust.yml`._
